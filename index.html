<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>校園王 | CampusKing</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/landing.css">
</head>
<body>
    <div class="split-layout" id="landing-page" style="opacity: 0; transition: opacity 0.3s;">
        <div class="mobile-header">
            <div class="brand-logo">
                <img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png" width="28" height="28" alt="Logo">
                CampusKing
            </div>
            <button class="btn-login-trigger" onclick="openLoginModal()">登 入</button>
        </div>
        <div class="left-panel">
            <div class="brand-logo desktop-logo">
                <img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png" width="32" height="32" alt="Logo">
                CampusKing
            </div>
            <div class="hero-text">
                <h1>你的專屬校園生存<br>導航系統</h1>
            </div>
            
            <div class="news-widget-mini" onclick="document.getElementById('dynamic-news-widget').classList.toggle('show')">
                <span class="pulse-dot"></span> 系統最新動態公告
            </div>
            <div class="news-widget hidden" id="dynamic-news-widget">
                <h3>✨ 最新系統動態</h3>
                <div id="news-loading" style="font-size: 0.9rem; opacity: 0.8;">載入中...</div>
            </div>

            <div style="position: absolute; bottom: 20px; left: 0; width: 100%; text-align: center; font-size: 0.85rem; opacity: 0.6; pointer-events: none;">
                &copy; 2026 CampusKing. All rights reserved.
            </div>
        </div>
        <div class="right-panel">
            <div class="login-wrapper">
                <button class="btn-close-modal" onclick="closeLoginModal()">✖</button>
                <h2>歡迎使用 👑</h2>
                <p class="subtitle">一鍵登入，即刻開啟你的校園霸業</p>
                
                <div class="primary-actions">
                    <button class="btn-massive btn-google-massive" onclick="loginWithGoogle()">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="24">
                        使用 Google 一鍵登入
                    </button>
                    <button class="btn-massive btn-guest-massive" onclick="loginAnonymously()">
                        👻 免裝備新手試用體驗
                    </button>
                </div>

                <div class="divider">或使用傳統信箱登入</div>

                <div class="secondary-login">
                    <div class="input-group">
                        <input type="email" id="email" placeholder="電子信箱">
                    </div>
                    <div class="input-group" style="margin-bottom: 10px;">
                        <input type="password" id="password" placeholder="密碼 (至少6位數)">
                    </div>
                    <div class="login-options">
                        <label style="display:flex; align-items:center; cursor:pointer;">
                            <input type="checkbox" id="chk-remember" style="margin-right: 8px; width:16px; height:16px; accent-color: var(--primary);" checked> 保持登入
                        </label>
                        <a onclick="forgotPassword()">忘記密碼？</a>
                    </div>
                    <button class="btn-main-outline" onclick="handleLogin()" id="btn-submit">信箱登入</button>
                </div>

                <div class="toggle-mode">
                    <span id="toggle-text" style="color: var(--text-muted); font-weight: normal;">還沒有帳號？</span>
                    <span onclick="registerAccount()" id="toggle-btn">立即註冊</span>
                </div>
            </div>
        </div>
    </div>
    <script src="js/firebase.js"></script>
    <script>
        db.collection("public").doc("landing_news").get().then(doc => {
            const container = document.getElementById('dynamic-news-widget');
            if (doc.exists && doc.data().items && doc.data().items.length > 0) {
                let html = '<h3>✨ 最新系統動態</h3>';
                doc.data().items.forEach(item => {
                    html += `
                    <div class="news-item">
                        <span class="news-tag" style="background: ${item.bgColor}; color: ${item.color};">${item.tag}</span>
                        <div class="news-content">${item.content}</div>
                    </div>`;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = '<h3>✨ 最新系統動態</h3><div class="news-item"><div class="news-content">目前沒有最新動態。</div></div>';
            }
        }).catch(err => {
            document.getElementById('news-loading').innerText = "無法載入最新動態";
        });
        
        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'app.html';
            } else {
                // 確認未登入後，才將畫面淡入顯示
                document.getElementById('landing-page').style.opacity = '1';
            }
        });

        function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('chk-remember').checked;

            if (!email || !password) {
                alert("請輸入 Email 和密碼");
                return;
            }

            // 根據是否勾選「保持登入」來設定 Firebase 的 Session 狀態
            const persistenceType = remember
                ? firebase.auth.Auth.Persistence.LOCAL    // 關閉瀏覽器後依然保持登入
                : firebase.auth.Auth.Persistence.SESSION; // 關閉瀏覽器分頁後自動登出

            auth.setPersistence(persistenceType)
                .then(() => {
                    return auth.signInWithEmailAndPassword(email, password);
                })
                .catch(e => alert("登入失敗：" + e.message));
        }

        function registerAccount() {
            const email = prompt("請輸入要註冊的 Email 信箱：");
            if (email) {
                const password = prompt("請設定密碼 (至少6個字元)：");
                if (password) {
                    auth.createUserWithEmailAndPassword(email, password)
                        .then(() => alert("🎉 註冊成功！系統將自動登入。"))
                        .catch(e => alert("註冊失敗：" + e.message));
                }
            }
        }

        function loginWithGoogle() { auth.signInWithPopup(provider).catch(e => alert("Google 登入錯誤：" + e.message)); }
        function loginAnonymously() { auth.signInAnonymously().catch(e => alert("匿名登入錯誤：" + e.message)); }

        function forgotPassword() {
            const email = document.getElementById('email').value;
            if (!email) {
                alert("請先在上方輸入您的 Email 信箱，系統才能寄送重設信給您！");
                return;
            }
            if (confirm(`確定要寄送重設密碼信件至 ${email} 嗎？`)) {
                auth.sendPasswordResetEmail(email)
                    .then(() => alert("📧 重設信已寄出！請檢查信箱。"))
                    .catch(e => alert("發送失敗：" + e.message));
            }
        }

        // 開啟手機版登入視窗
        function openLoginModal() {
            document.querySelector('.right-panel').classList.add('show-modal');
        }

        // 關閉手機版登入視窗
        function closeLoginModal() {
            document.querySelector('.right-panel').classList.remove('show-modal');
        }
    </script>
</body>
</html>
